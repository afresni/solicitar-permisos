<style>
  /* =========================================================
     Base / Reset ligero
     ========================================================= */
  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
  }

  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f3f6fa;
    color: #1f2937;
    line-height: 1.45;
  }

  [hidden] {
    display: none !important;
  }

  /* =========================================================
     Estructura principal
     ========================================================= */
  .app-shell {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1rem;
  }

  .view-container {
    margin-top: 1rem;
  }

  .view-panel {
    background: #ffffff;
    border: 1px solid #e5eaf1;
    border-radius: 12px;
    box-shadow: 0 4px 14px rgba(31, 41, 55, 0.06);
    padding: 1rem;
  }

  .view-panel + .view-panel {
    margin-top: 1rem;
  }

  /* =========================================================
     Header institucional
     ========================================================= */
  .app-header {
    background: #ffffff;
    border: 1px solid #e5eaf1;
    border-radius: 12px;
    box-shadow: 0 4px 14px rgba(31, 41, 55, 0.06);
    padding: 1rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }

  .app-title {
    margin: 0;
    font-size: 1.35rem;
    font-weight: 700;
    color: #1e3a8a;
  }

  .app-subtitle {
    margin: 0.25rem 0 0;
    font-size: 0.9rem;
    color: #64748b;
  }

  #user-info {
    min-height: 1.5rem;
    font-size: 0.92rem;
    color: #334155;
    text-align: right;
  }

  /* =========================================================
     Navegación
     ========================================================= */
  .app-nav {
    margin-top: 0.85rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    background: #ffffff;
    border: 1px solid #e5eaf1;
    border-radius: 12px;
    padding: 0.6rem;
  }

  .nav-tab {
    appearance: none;
    border: 1px solid #cbd5e1;
    background: #f8fafc;
    color: #1e3a8a;
    border-radius: 10px;
    padding: 0.55rem 0.95rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.12s ease;
  }

  .nav-tab:hover {
    background: #eaf1ff;
    border-color: #93c5fd;
  }

  .nav-tab:active {
    transform: translateY(1px);
  }

  .nav-tab.active {
    background: #dbeafe;
    border-color: #60a5fa;
    color: #1d4ed8;
  }

  /* =========================================================
     Formularios
     ========================================================= */
  .form-solicitud {
    display: grid;
    gap: 0.85rem;
    margin-top: 0.5rem;
  }

  .form-row {
    display: grid;
    gap: 0.4rem;
  }

  .form-row--inline {
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
  }

  .form-field {
    display: grid;
    gap: 0.4rem;
  }

  label {
    font-size: 0.92rem;
    font-weight: 600;
    color: #334155;
  }

  input,
  select,
  textarea {
    width: 100%;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    background: #ffffff;
    color: #0f172a;
    padding: 0.62rem 0.72rem;
    font-size: 0.95rem;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  textarea {
    resize: vertical;
    min-height: 110px;
  }

  input:hover,
  select:hover,
  textarea:hover {
    border-color: #94a3b8;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
  }

  .form-actions {
    margin-top: 0.35rem;
    display: flex;
    justify-content: flex-start;
    gap: 0.5rem;
  }

  .form-actions button,
  .btn,
  .btn-primary {
    appearance: none;
    border: 1px solid #1d4ed8;
    background: #2563eb;
    color: #ffffff;
    border-radius: 10px;
    padding: 0.62rem 1rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.12s ease;
  }

  .form-actions button:hover,
  .btn:hover,
  .btn-primary:hover {
    background: #1d4ed8;
    border-color: #1e40af;
  }

  .form-actions button:active,
  .btn:active,
  .btn-primary:active {
    transform: translateY(1px);
  }

  .form-actions button:focus-visible,
  .btn:focus-visible,
  .btn-primary:focus-visible,
  .nav-tab:focus-visible {
    outline: 3px solid rgba(37, 99, 235, 0.28);
    outline-offset: 1px;
  }

  /* =========================================================
     Tablas
     ========================================================= */
  .table-wrapper {
    margin-top: 0.5rem;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border: 1px solid #e5eaf1;
    border-radius: 10px;
    background: #ffffff;
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 620px;
    font-size: 0.92rem;
  }

  .data-table thead th {
    background: #eff6ff;
    color: #1e3a8a;
    font-weight: 700;
    text-align: left;
    padding: 0.68rem 0.72rem;
    border-bottom: 1px solid #dbe6f5;
    white-space: nowrap;
  }

  .data-table tbody td {
    padding: 0.62rem 0.72rem;
    border-bottom: 1px solid #edf2f7;
    color: #1f2937;
    vertical-align: top;
  }

  .data-table tbody tr:last-child td {
    border-bottom: none;
  }

  .data-table tbody tr:hover {
    background: #f8fbff;
  }

  /* =========================================================
     Responsive
     ========================================================= */
  @media (max-width: 900px) {
    .app-shell {
      padding: 0.85rem;
    }

    .app-header {
      padding: 0.9rem;
    }

    .view-panel {
      padding: 0.9rem;
    }

    .form-row--inline {
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }
  }

  @media (max-width: 640px) {
    .app-shell {
      padding: 0.7rem;
    }

    .app-header {
      flex-direction: column;
      align-items: flex-start;
    }

    #user-info {
      text-align: left;
      width: 100%;
    }

    .app-title {
      font-size: 1.2rem;
    }

    .app-subtitle {
      font-size: 0.86rem;
    }

    .app-nav {
      padding: 0.5rem;
      gap: 0.45rem;
    }

    .nav-tab {
      width: 100%;
      text-align: left;
    }

    input,
    select,
    textarea {
      font-size: 16px;
    }

    .form-actions {
      justify-content: stretch;
    }

    .form-actions button,
    .btn,
    .btn-primary {
      width: 100%;
    }
  }
</style>
